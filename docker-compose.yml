services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      # Optional tuning knobs
      FETCH_CACHE_TTL: "21600"      # seconds
      FETCH_CACHE_MAX: "512"
      PER_STORE_LIMIT: "6"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:delegated

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      GROCERIES_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8505:8501"
    volumes:
      - ./:/app:delegated
