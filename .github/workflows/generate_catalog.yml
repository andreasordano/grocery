name: Generate normalized catalog

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run catalog generator
        run: |
          python - <<'PY'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from catalog.generate_catalog import generate_catalog
          generate_catalog()
          PY

      - name: Upload normalized_catalog.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: normalized_catalog
          path: catalog/normalized_catalog.json

      - name: Commit normalized_catalog.json back to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/normalized_catalog.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update normalized_catalog.json (generated by workflow)" || true
            # push back to the same branch the workflow ran on
            BRANCH=${GITHUB_REF#refs/heads/}
            git push origin HEAD:"${BRANCH}"
          fi
